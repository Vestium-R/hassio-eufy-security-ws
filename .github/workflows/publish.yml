name: "Publish"

on:
  push:
    branches:
      - master

jobs:
  build:
    name: Build and push to ghcr.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - arch: aarch64
            platform: linux/arm64
            base: ghcr.io/home-assistant/aarch64-base:3.20
          - arch: amd64
            platform: linux/amd64
            base: ghcr.io/home-assistant/amd64-base:3.20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./eufy-security-ws
          platforms: ${{ matrix.platform }}
          push: true
          tags: ghcr.io/vestium-r/hassio-eufy-security-ws-${{ matrix.arch }}:2.1.5
          build-args: BUILD_FROM=${{ matrix.base }}
